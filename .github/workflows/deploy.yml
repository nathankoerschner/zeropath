name: Deploy to GCP

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ secrets.GCP_REGION }}
  REGISTRY: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/zeropath
  IMAGE_TAG: sha-${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker $GCP_REGION-docker.pkg.dev --quiet

      - name: Resolve deployed backend URL
        id: backend_url
        run: |
          BACKEND_URL=$(gcloud run services describe zeropath-api \
            --region "$GCP_REGION" \
            --format='value(status.url)')
          echo "backend_url=$BACKEND_URL" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        run: |
          docker build -t "$REGISTRY/backend:$IMAGE_TAG" backend
          docker push "$REGISTRY/backend:$IMAGE_TAG"

      - name: Build and push worker image
        run: |
          docker build -t "$REGISTRY/worker:$IMAGE_TAG" worker
          docker push "$REGISTRY/worker:$IMAGE_TAG"

      - name: Build and push frontend image
        run: |
          docker build \
            -t "$REGISTRY/frontend:$IMAGE_TAG" \
            --build-arg VITE_CLERK_PUBLISHABLE_KEY="${{ secrets.CLERK_PUBLISHABLE_KEY }}" \
            --build-arg VITE_API_BASE_URL="${{ steps.backend_url.outputs.backend_url }}" \
            frontend
          docker push "$REGISTRY/frontend:$IMAGE_TAG"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Terraform init
        working-directory: infra
        run: terraform init

      - name: Terraform apply
        working-directory: infra
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_region: ${{ secrets.GCP_REGION }}
          TF_VAR_environment: production
          TF_VAR_clerk_secret_key: ${{ secrets.CLERK_SECRET_KEY }}
          TF_VAR_clerk_publishable_key: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
          TF_VAR_clerk_jwks_url: ${{ secrets.CLERK_JWKS_URL }}
          TF_VAR_openai_api_key: ${{ secrets.OPENAI_API_KEY }}
        run: |
          terraform apply -auto-approve \
            -var="backend_image=$REGISTRY/backend:$IMAGE_TAG" \
            -var="worker_image=$REGISTRY/worker:$IMAGE_TAG" \
            -var="frontend_image=$REGISTRY/frontend:$IMAGE_TAG"
